name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: starttech-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/MuchToDo/go.sum

      - name: Run tests
        working-directory: backend/MuchToDo
        run: go test ./...

      - name: Run vulnerability scan
        working-directory: backend/MuchToDo
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: meta
        working-directory: backend/MuchToDo
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "tags=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: table
          exit-code: 1
          severity: CRITICAL

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Store secrets in SSM and deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ssm put-parameter --name "/starttech/MONGO_URI" --value "${{ secrets.MONGO_URI }}" --type SecureString --overwrite
          aws ssm put-parameter --name "/starttech/DB_NAME" --value "${{ secrets.DB_NAME }}" --type String --overwrite
          aws ssm put-parameter --name "/starttech/JWT_SECRET_KEY" --value "${{ secrets.JWT_SECRET_KEY }}" --type SecureString --overwrite
          aws ssm put-parameter --name "/starttech/ECR_IMAGE" --value "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" --type String --overwrite
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name starttech-asg \
            --preferences MinHealthyPercentage=50,InstanceWarmup=60

      - name: Wait for deployment to complete
        run: |
          aws autoscaling wait \
            --auto-scaling-group-name starttech-asg

      - name: Smoke test
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names starttech-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          curl -f http://$ALB_DNS/health || exit 1

      - name: Setup CloudWatch monitoring
        run: |
          aws logs create-log-group \
            --log-group-name /starttech/production/app \
            --region ${{ env.AWS_REGION }} || true


